<style>
  html, body { margin: 0; padding: 0; background: #0a0d14; font-family: var(--font-display); min-height: 100vh; }
  body { overscroll-behavior-y: none; -webkit-tap-highlight-color: transparent; }
  * { box-sizing: border-box; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  select option { background: #14171f; color: #e8eaef; }
  button:focus-visible, select:focus-visible, input:focus-visible {
    outline: 2px solid oklch(0.66 0.16 250);
    outline-offset: 2px;
  }
  /* Use safe-area insets on phones with notches / dynamic islands */
  @supports (padding: max(0px)) {
    body {
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
  }
</style>
